# OpenLogo issue label taxonomy — the single source of truth for the labeler.
# Sync with: see .github/skills/product-owner/triage-and-label/SKILL.md
# Rule: exactly one agent:* and one type:* per issue; add profile:*/area:*/level:* as they apply.

# --- Owning agent (exactly one) ---
- { name: "agent:orchestrator",      color: "5319e7", description: "Owned by the orchestrator / tech-lead" }
- { name: "agent:product-owner",     color: "5319e7", description: "Owned by the product owner" }
- { name: "agent:language-designer", color: "5319e7", description: "Owned by the language designer" }
- { name: "agent:interpreter",       color: "5319e7", description: "Owned by the interpreter engineer" }
- { name: "agent:turtle-engine",     color: "5319e7", description: "Owned by the turtle engine" }
- { name: "agent:learner-experience",color: "5319e7", description: "Owned by learner experience (studio)" }

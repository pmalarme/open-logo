- { name: "type:foundation",  color: "6f42c1", description: "Toolchain / monorepo / CI setup (mostly M0)" }
- { name: "type:docs",        color: "0075ca", description: "Documentation task" }
- { name: "type:chore",       color: "bfdadc", description: "Small maintenance task" }


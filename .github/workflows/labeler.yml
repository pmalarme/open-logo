name: Labeler

# Auto-applies path-based labels to PRs from .github/labeler.yml.
# Labeler seeds agent:*/area:* from changed paths; @product-owner triage confirms the
# final one-agent + one-type + milestone. See .github/skills/devops/labeler-and-labels.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v7
        with:
          sync-labels: false

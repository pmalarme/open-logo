name: CI

# Encodes the team Definition of Done as gates. The meta job runs from day one and
# detects whether the workspace manifest (package.json) has landed; code jobs activate
# automatically once it has. See .github/skills/devops/ci-pipeline/SKILL.md. Owned by @devops.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  meta:
    name: Meta (labels, issue forms, workflows)
    runs-on: ubuntu-latest
    outputs:
      has_toolchain: ${{ steps.detect.outputs.has_toolchain }}
      studio_changed: ${{ steps.filter.outputs.studio }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install pyyaml
      - name: Validate metadata
        run: python .github/scripts/validate-meta.py
      - name: Self-test the frontmatter check
        run: python .github/scripts/test-validate-meta.py
      - id: detect
        name: Detect toolchain
        # hashFiles() is unreliable in a job-level `if` (it runs before checkout), so we
        # detect the manifest here and expose it as an output the code jobs gate on.
        run: |
          if [ -f package.json ]; then
            echo "has_toolchain=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_toolchain=false" >> "$GITHUB_OUTPUT"
          fi
      - id: filter
        name: Detect studio-affecting changes
        # Path-scopes the (heavy, browser-based) studio visual-regression job so it only runs when
        # the studio or a package it composes actually changes. Output consumed by `studio-visual`.
        uses: dorny/paths-filter@v3
        with:
          filters: |
            studio:
              - 'packages/studio/**'
              - 'packages/core/**'
              - 'packages/parser/**'
              - 'packages/runtime/**'
              - 'packages/turtle/**'
              - 'packages/edu/**'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

  build:
    name: Build & type-check
    needs: meta
    if: ${{ needs.meta.outputs.has_toolchain == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      # Install from the committed lockfile (npm workspaces — see ADR-0001).
      # No --if-present: every DoD script exists now that the toolchain has landed, so a
      # missing gate is a real failure rather than a silent pass.
      - run: npm ci
      - run: npm run -s build
      - run: npm run -s typecheck

  lint:
    name: Lint & format
    needs: meta
    if: ${{ needs.meta.outputs.has_toolchain == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run -s lint
      - run: npm run -s format:check

  test:
    name: Unit, conformance & examples
    needs: meta
    if: ${{ needs.meta.outputs.has_toolchain == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run -s test
      - run: npm run -s conformance
      - run: npm run -s examples
      # TODO(@devops + @testing): add integration and a11y/pedagogy gates as those
      # suites land (DoD sections 5-9); wire them here so they block merge.

  coverage:
    name: Test coverage (100%)
    needs: meta
    if: ${{ needs.meta.outputs.has_toolchain == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run -s coverage

  studio-visual:
    name: Studio visual regression
    needs: meta
    # Path-scoped: only runs when the studio (or a package it composes) changes — see the `filter`
    # step in `meta`. Runs in the Playwright-maintained container so the headless Chromium + system
    # fonts exactly match the image the committed `-linux.png` baselines were generated in
    # (packages/studio/playwright.config.ts documents the matching `docker run` command). Kept out
    # of the `node:test` coverage gate: these are `e2e/*.spec.ts` files, not `*.test.mjs`.
    if: ${{ needs.meta.outputs.has_toolchain == 'true' && needs.meta.outputs.studio_changed == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # BOOTSTRAP (temporary): regenerate the Linux baselines in the pinned Playwright container and
      # upload them as an artifact so they can be committed. Reverted to plain verify mode in the
      # same PR once the baselines are committed.
      - name: Regenerate studio visual-regression baselines
        run: npm run -s test:visual --workspace @openlogo/studio -- --update-snapshots
      - name: Upload regenerated baselines
        uses: actions/upload-artifact@v4
        with:
          name: studio-visual-snapshots
          path: packages/studio/e2e/__screenshots__/*-linux.png
      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: studio-visual-playwright-report
          path: packages/studio/playwright-report/
          retention-days: 7

name: CodeQL

# Static security analysis for JavaScript/TypeScript. Dormant until the workspace
# manifest lands (there is nothing to scan before then); it then runs on PRs, pushes
# to main, and weekly. Guarded like ci.yml so it activates automatically. Owned by @devops.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"

permissions:
  contents: read

jobs:
  detect:
    name: Detect toolchain
    runs-on: ubuntu-latest
    outputs:
      has_toolchain: ${{ steps.detect.outputs.has_toolchain }}
    steps:
      - uses: actions/checkout@v7
      - id: detect
        # hashFiles() is unreliable in a job-level `if` (it runs before checkout), so we
        # detect the manifest here and expose it as an output the analyze job gates on.
        run: |
          if [ -f package.json ]; then
            echo "has_toolchain=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_toolchain=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze (javascript-typescript)
    needs: detect
    if: ${{ needs.detect.outputs.has_toolchain == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4

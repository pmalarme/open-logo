<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/openlogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c2430" />
    <link rel="stylesheet" href="/web/styles.css" />
    <title>OpenLogo Studio</title>
  </head>
  <body>
    <header>
      <img
        src="/openlogo.png"
        alt="OpenLogo — DRAW · LEARN · CREATE"
        height="64"
      />
      <div>
        <h1>OpenLogo Studio</h1>
        <p class="tagline">
          <span class="tagline-draw">DRAW</span>
          <span class="tagline-dot">&middot;</span>
          <span class="tagline-learn">LEARN</span>
          <span class="tagline-dot">&middot;</span>
          <span class="tagline-create">CREATE</span>
        </p>
      </div>
    </header>
    <div
      id="announcer-polite"
      aria-live="polite"
      aria-atomic="true"
      class="sr-only"
    ></div>
    <div
      id="announcer-assertive"
      aria-live="assertive"
      aria-atomic="true"
      class="sr-only"
    ></div>
    <main>
      <!--
        #313 extension slot for the future lesson pane (#127/M3): a placeholder that stays
        `hidden` (fully removed from layout, focus order, and the accessibility tree) until a
        future lesson-pane module mounts into the app shell's existing "lesson" region
        (`APP_SHELL_REGIONS` in src/app-shell.ts, unchanged since #123) and clears this `hidden`
        attribute. `web/styles.css`'s `main:has(.pane-lesson:not([hidden]))` rules already reserve
        its column/row in both the wide (3-column: lesson | editor+controls | turtle) and narrow
        (stacked, lesson first) layouts, so mounting a lesson pane needs NO further edits to this
        file, styles.css, or app-shell.ts. The mounting module is responsible for its own
        role/aria-label and a REPL_FOCUS_ORDER/REPL_LANDMARK_ROLES entry in src/a11y.ts, since
        #313 cannot declare an accessible name/role for content that doesn't exist yet.
      -->
      <section
        id="lesson-pane"
        class="pane-lesson"
        aria-label="Lesson"
        hidden
      ></section>
      <section class="pane-editor" aria-label="Editor">
        <textarea
          id="editor"
          rows="10"
          cols="60"
          spellcheck="false"
          role="textbox"
          aria-label="OpenLogo source editor"
        ></textarea>
      </section>
      <section class="pane-controls" aria-label="Run controls" role="toolbar">
        <button id="run-button" type="button">Run</button>
        <button id="stop-button" type="button">Stop</button>
        <button id="reset-button" type="button">Reset</button>
        <span class="speed-control">
          <label for="speed-slider">Turtle speed</label>
          <input
            id="speed-slider"
            type="range"
            min="0"
            max="100"
            step="1"
            aria-describedby="speed-description"
          />
          <span id="speed-description" aria-live="polite"></span>
        </span>
        <p
          id="run-status"
          role="status"
          aria-live="polite"
          aria-label="Run status"
        ></p>
      </section>
      <section class="pane-turtle" aria-label="Turtle canvas">
        <canvas
          id="turtle-canvas"
          width="500"
          height="500"
          role="img"
          aria-label="Turtle canvas"
          tabindex="0"
        ></canvas>
        <p
          id="turtle-state"
          role="status"
          aria-live="polite"
          aria-label="Turtle state"
        ></p>
      </section>
      <section class="pane-output" aria-label="Output">
        <pre id="output"></pre>
      </section>
      <section class="pane-diagnostics" aria-label="Diagnostics">
        <ul
          id="diagnostics-list"
          role="log"
          aria-label="Diagnostics"
          aria-live="polite"
          tabindex="0"
        ></ul>
      </section>
    </main>
    <script type="module" src="/web/main.ts"></script>
  </body>
</html>

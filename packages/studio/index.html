<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/openlogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c2430" />
    <link rel="stylesheet" href="/web/styles.css" />
    <title>OpenLogo Studio</title>
  </head>
  <body>
    <header>
      <img
        src="/openlogo.png"
        alt="OpenLogo — DRAW · LEARN · CREATE"
        height="64"
      />
      <div>
        <h1>OpenLogo Studio</h1>
        <p class="tagline">
          <span class="tagline-draw">DRAW</span>
          <span class="tagline-dot">&middot;</span>
          <span class="tagline-learn">LEARN</span>
          <span class="tagline-dot">&middot;</span>
          <span class="tagline-create">CREATE</span>
        </p>
      </div>
    </header>
    <div
      id="announcer-polite"
      aria-live="polite"
      aria-atomic="true"
      class="sr-only"
    ></div>
    <div
      id="announcer-assertive"
      aria-live="assertive"
      aria-atomic="true"
      class="sr-only"
    ></div>
    <main>
      <!--
        #127 wires the lesson pane into this slot (`APP_SHELL_REGIONS`'s existing "lesson" region,
        unchanged since #123): `role="complementary"`/`aria-label="Lesson"` give it its
        accessibility landmark (`src/a11y.ts`'s `REPL_LANDMARK_ROLES`) — `complementary` (not the
        generic `region`) per M3's enrichment, since the lesson content supplements the primary
        editor/canvas task rather than being the page's main content — and `tabindex="0"` makes it
        a keyboard focus stop (`REPL_FOCUS_ORDER`) since a plain `<section>` isn't natively
        focusable — matching the `#diagnostics-list` precedent below. It still starts `hidden`;
        native `hidden` removes it from both the accessibility tree and the real tab order
        whenever no lesson is loaded (freeform/sandbox mode), so neither attribute causes a
        keyboard trap. `web/main.ts`'s lesson-pane wiring (co-owned with `src/lesson-pane.ts`)
        builds this section's own heading structure (`<h2>` title, `<h3>`s for Objective/worked
        examples/exercise prompt) and toggles `hidden` from `src/lesson-pane.ts`'s
        `LessonPaneView`. `web/styles.css`'s `main:has(.pane-lesson:not([hidden]))` rules already
        reserve its own leftmost column/row in both the wide (3-column: lesson | editor+controls |
        turtle, `minmax(0, 300px)` so it collapses toward the editor/turtle's minimums under width
        pressure rather than the reverse) and narrow (stacked, lesson first) layouts, plus give it
        an independent vertical scroll region — no further edits needed there or to
        `app-shell.ts`.
      -->
      <section
        id="lesson-pane"
        class="pane-lesson"
        role="complementary"
        aria-label="Lesson"
        tabindex="0"
        hidden
      ></section>
      <section class="pane-editor" aria-label="Editor">
        <!--
          #315 (`docs/adr/0013-studio-editor-component.md`): CodeMirror 6 mounts its own
          `contenteditable` host into this plain container (`web/main.ts`'s
          `new EditorView({ state, parent: editorHostElement })`) rather than reusing the old
          plain textarea element. CM6's `EditorView.contentAttributes` facet (wired in
          `src/editor-cm6.ts`'s `createEditorExtensions`) sets `role="textbox"`/`aria-label`
          directly on that real content-editable element — the single #279 `REPL_FOCUS_ORDER`
          `textbox` focus stop — so this container itself carries neither attribute (that would
          create a second, redundant textbox landmark). CM6's own line-number/fold gutter
          (`.cm-gutters`) is marked `aria-hidden="true"` by `@codemirror/view` itself, with no
          extra wiring needed here.
        -->
        <div id="editor-host"></div>
      </section>
      <section class="pane-controls" aria-label="Run controls" role="toolbar">
        <button
          id="run-toggle-button"
          type="button"
          class="icon-button"
          data-icon="play"
          aria-label="Start run"
        >
          <span class="control-icon" aria-hidden="true"></span>
          <span id="run-toggle-label" class="control-label">Start</span>
        </button>
        <button
          id="reset-button"
          type="button"
          class="icon-button"
          data-icon="reset"
          aria-label="Reset"
        >
          <span class="control-icon" aria-hidden="true"></span>
          <span class="control-label">Reset</span>
        </button>
        <span class="speed-control">
          <label for="speed-slider">Turtle speed</label>
          <input
            id="speed-slider"
            type="range"
            min="0"
            max="100"
            step="1"
            aria-describedby="speed-description"
          />
          <span id="speed-description" aria-live="polite"></span>
        </span>
        <p
          id="run-status"
          role="status"
          aria-live="polite"
          aria-label="Run status"
        ></p>
        <div class="run-log-wrapper">
          <h2 class="run-log-heading-title">Run log</h2>
          <ol id="run-log" role="log" aria-label="Run log" tabindex="0"></ol>
        </div>
      </section>
      <section class="pane-turtle" aria-label="Turtle canvas">
        <canvas
          id="turtle-canvas"
          width="500"
          height="500"
          role="img"
          aria-label="Turtle canvas"
          tabindex="0"
        ></canvas>
        <p
          id="turtle-state"
          role="status"
          aria-live="polite"
          aria-label="Turtle state"
          tabindex="0"
        ></p>
      </section>
      <section class="pane-output" aria-label="Output">
        <pre
          id="output"
          role="status"
          aria-live="polite"
          aria-label="Program output"
          tabindex="0"
        ></pre>
      </section>
      <section class="pane-diagnostics" aria-label="Diagnostics">
        <ul
          id="diagnostics-list"
          role="log"
          aria-label="Diagnostics"
          aria-live="polite"
          tabindex="0"
        ></ul>
      </section>
      <section
        id="tutor-output-pane"
        class="pane-tutor"
        aria-label="Tutor output"
        hidden
      >
        <!-- #334 — the whole section (not just the list) is hidden until explain/why/hint/debug
             has ever run: web/main.ts's renderTutorOutput toggles this section's `hidden` from
             TutorOutputController's `getView().isVisible`, matching `.pane-lesson`'s direct
             `hidden` toggle above so `main:has(.pane-tutor:not([hidden]))` in web/styles.css only
             reserves grid space once the pane is truly visible; it never blocks/replaces the
             editor or diagnostics panes. -->
        <ul
          id="tutor-output"
          role="log"
          aria-label="Tutor output"
          aria-live="polite"
          tabindex="0"
        ></ul>
      </section>
    </main>
    <script type="module" src="/web/main.ts"></script>
  </body>
</html>
